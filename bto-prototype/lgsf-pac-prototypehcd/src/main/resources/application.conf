camera {

  # image width in pixels
  width  = 1944
  
  # image height in pixels
  height = 1472

  # Default exposure time in microseconds
  default_exposure-time-us = 10000.0

  # Default gain
  defaultGain = 1.0
}

pac-prototype-hcd {
  # Set to true to use synthetic Gaussian images without loading the native library.
  # Keep true for unit testing or when no physical camera is present.
  simulation-mode = false

  # Default GigE IP address of the Imperx C1911
  camera-ip = "192.168.1.228"

  # Default continuous stream frame period
  frame-period-millis = 1000

  vbds {
    # Enable publishing each frame to VBDS over HTTP as FITS bytes
    enabled = false

    # VBDS server endpoint
    host = "127.0.0.1"
    port = 7777

    # VBDS stream to publish to
    stream-name = "PAC-RAW"
    content-type = "image/fits"

    # If true, try to create the stream on actor startup
    auto-create-stream = true

    # HTTP timeout for create/publish requests
    request-timeout-millis = 5000
  }
}
