
pac-prototype-hcd {

  vbds {
    # Enable publishing each frame to VBDS over HTTP as FITS bytes
    enabled = true

    # VBDS server endpoint
    host = "192.168.1.1"
    port = 37777

    # VBDS stream to publish to
    stream-name = "PAC-RAW"
    content-type = "image/fits"

    # If true, try to create the stream on actor startup
    auto-create-stream = true

    # HTTP timeout for create/publish requests
    request-timeout-millis = 5000
  }
}
